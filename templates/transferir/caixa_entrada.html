<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa de Entrada - AllMedias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />
    <style>
        body { padding: 10px; background-color: #f8f9fa; font-family: sans-serif; }
        .header-title { background: #ffc107; color: #000; padding: 15px; border-radius: 8px 8px 0 0; margin: -10px -10px 15px -10px; font-weight: bold; }
        .list-container { background: white; margin: 0 -10px; border: 1px solid #dee2e6; border-radius: 8px; }
        .item-row { padding: 15px; border-bottom: 1px solid #eee; }
        .item-row:last-child { border-bottom: none; }
        .item-info { margin-bottom: 12px; }
        .item-title { font-weight: bold; font-size: 16px; color: #333; display: block; }
        .item-meta { font-size: 13px; color: #666; }
        .item-actions { display: flex; gap: 8px; }
        .btn-action { flex: 1; padding: 8px; font-weight: bold; font-size: 13px; border-radius: 6px; text-decoration: none; text-align: center; }
        
        .empty-msg { padding: 50px 20px; text-align: center; color: #999; }
        .footer-nav { margin-top: 30px; padding: 0 10px; }
    </style>
</head>
<body>
    <div class="d-flex align-items-center gap-2 mb-3">
        <a href="{% url 'transferir_medias' %}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <strong>📥 Caixa de Entrada</strong>
    </div>

    <div class="list-container">
        {% for item in pendentes %}
        <div class="item-row">
            <div class="item-info">
                <span class="item-title">{{ item.titulo }}</span>
                <div class="item-meta">
                    <b>Tipo:</b> {{ item.subtitulo }}<br>
                    <b>De:</b> {{ item.remetente.email|default:item.remetente.username }}<br>
                    <b>Data:</b> {{ item.data_envio|date:"d/m/Y H:i" }}
                </div>
            </div>
            <div class="item-actions">
                <a href="{% url 'transferir_acao' item.id 'aceitar' %}" class="btn-action btn btn-success">Aceitar</a>
                <a href="{% url 'transferir_acao' item.id 'recusar' %}" class="btn-action btn btn-warning">Recusar</a>
                <a href="{% url 'transferir_acao' item.id 'excluir' %}" class="btn-action btn btn-outline-danger" onclick="return confirm('Deseja excluir este pedido?')">Excluir</a>
            </div>
        </div>
        {% empty %}
        <div class="empty-msg">
            <h4>Tudo limpo!</h4>
            <p>Você não tem novas solicitações.</p>
        </div>
        {% endfor %}
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
