{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Até logo - AllMedias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e8 0%, #d4edda 50%, #c3e6cb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .logout-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            padding: 2.5rem 2rem;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logout-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .divider {
            border: none;
            border-top: 1px solid #e9ecef;
            margin: 1.5rem 0;
        }
        .btn-entrar {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 25px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        .btn-entrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(40,167,69,0.35);
            color: white;
        }
        .app-name {
            font-size: 0.85rem;
            color: #adb5bd;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-icon">👋</div>

        <h3 class="fw-bold text-success mb-1">Até logo!</h3>
        <p class="text-muted mb-0" style="font-size:1.05rem;">
            Obrigado por usar o <strong>AllMedias</strong>.<br>
            Suas mídias estão seguras e guardadas.
        </p>

        <hr class="divider">

        <p class="text-muted" style="font-size:0.9rem;">
            Esperamos te ver em breve. 😊<br>
            Volte quando quiser!
        </p>

        <a href="{% url 'login' %}" class="btn-entrar mt-2">
            <i class="fas fa-sign-in-alt me-2"></i>Entrar novamente
        </a>

        <p class="app-name">AllMedias &mdash; Todas as suas mídias em um só lugar</p>
    </div>
</body>
</html>
