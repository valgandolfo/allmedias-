version: '3.8'

services:
  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: newmedia_db
      MYSQL_USER: newmedia
      MYSQL_PASSWORD: newmediapass
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    # Comando que vai rodar assim que o container ligar: faz as migrações e sobe o servidor
    command: bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      # O "Volume" liga a pasta atual (do PC) na pasta /app (do contêiner)
      - .:/app
    ports:
      # Mapeia a porta 8000 do seu notebook para a porta 8000 do contêiner
      - "8000:8000"
    env_file:
      # Lê automaticamente o seu arquivo .env com as variáveis de ambiente!
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
